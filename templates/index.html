<!DOCTYPE html>
<html>
<head>
  <title>Login System</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 48%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .login-btn { background: #4CAF50; color: white; }
    .register-btn { background: #2196F3; color: white; }

    .message {
      margin-top: 15px;
      font-size: 14px;
    }

    .error { color: red; }
    .success { color: green; }

    label {
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">


  <div>
    <button class="register-btn" onclick="register()">Register</button>
    <button class="login-btn" onclick="login()">Login</button>
  </div>

  <div id="message" class="message"></div>
</div>

<script src="script.js"></script>

</body>
</html>
