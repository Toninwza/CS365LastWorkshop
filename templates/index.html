<!DOCTYPE html>
<html>
<head>
  <title>Login System</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 48%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .login-btn { background: #4CAF50; color: white; }
    .register-btn { background: #2196F3; color: white; }

    .message {
      margin-top: 15px;
      font-size: 14px;
    }

    .error { color: red; }
    .success { color: green; }

    label {
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">


  <div>
    <button class="register-btn" onclick="register()">Register</button>
    <button class="login-btn" onclick="login()">Login na</button>
  </div>

  <div id="message" class="message"></div>
</div>

<script>
  function showMessage(text, type) {
    const msg = document.getElementById("message");
    msg.innerText = text;
    msg.className = "message " + type;
  }

  function validatePassword(password) {
    if (password.length < 8) {
      return "Password must be at least 8 characters";
    }
    if (!/\d/.test(password)) {
      return "Password must contain at least 1 number";
    }
    return null;
  }

  function togglePassword() {
    const pwd = document.getElementById("password");
    const confirm = document.getElementById("confirmPassword");

    const type = pwd.type === "password" ? "text" : "password";
    pwd.type = type;
    confirm.type = type;
  }

  function register() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (!username || !password || !confirmPassword) {
      showMessage("Please fill all fields", "error");
      return;
    }

    if (password !== confirmPassword) {
      showMessage("Passwords do not match", "error");
      return;
    }

    const error = validatePassword(password);
    if (error) {
      showMessage(error, "error");
      return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if (users[username]) {
      showMessage("User already exists", "error");
      return;
    }

    users[username] = password;
    localStorage.setItem("users", JSON.stringify(users));

    showMessage("Register success!", "success");
  }

  function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || {};

    if (!users[username]) {
      showMessage("User not found", "error");
      return;
    }

    if (users[username] !== password) {
      showMessage("Wrong password", "error");
      return;
    }

    // เก็บ session
    localStorage.setItem("currentUser", username);

    showMessage("Login success 🎉", "success");

    // redirect
    setTimeout(() => {
      window.location.href = "home.html";
    }, 1000);
  }
</script>

</body>
</html>
