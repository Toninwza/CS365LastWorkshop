<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4CAF50, #2196F3);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s ease;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 20px;
    }

    .user {
      font-weight: bold;
      color: #2196F3;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #f44336;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #d32f2f;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Welcome 🎉</h1>
  <p>Hello, <span class="user" id="username"></span></p>

  <button onclick="logout()">Logout</button>
</div>

<script>
  const user = localStorage.getItem("currentUser");

  if (!user) {
    window.location.href = "index.html";
  }

  document.getElementById("username").innerText = user;

  function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "index.html";
  }
</script>

</body>
</html>
